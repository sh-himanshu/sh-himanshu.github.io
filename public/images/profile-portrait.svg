<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
  <title id="title">Alex Developer portrait illustration</title>
  <desc id="desc">Abstract portrait artwork with a monogram and layered gradients.</desc>
  <defs>
    <linearGradient id="bg" x1="80" x2="560" y1="48" y2="592" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="halo" x1="136" x2="502" y1="102" y2="520" gradientUnits="userSpaceOnUse">
